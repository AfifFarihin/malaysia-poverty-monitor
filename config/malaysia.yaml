country_code: MYS
country_name: Malaysia

# Data files
raw_dosm_poverty: data/raw/dosm/hh_poverty_state.csv
clean_dosm_poverty: data/interim/dosm_poverty_state_clean.csv
boundary_file: data/boundaries/malaysia_adm1_geoboundaries.geojson
state_panel: data/state_year_panel_modelready_2002_2022.csv
# Generated selected-model predictions by state-year, not raw/source data.
model_predictions: data/state_model_predictions.csv

# Pipeline settings
survey_years: [2002, 2004, 2007, 2009, 2012, 2014, 2016, 2019, 2020, 2022]
crs_epsg: 32648          # WGS84 / UTM Zone 48N — covers all of Malaysia

# geoBoundaries ADM1 property used by the dashboard choropleth.
admin1_col: shapeName

# Poverty label CSV: raw state name → normalized state_key used in joins
state_name_map:
  Johor: Johor
  Kedah: Kedah
  Kelantan: Kelantan
  W.P. Kuala Lumpur: KualaLumpur
  W.P. Labuan: Labuan
  Melaka: Melaka
  Negeri Sembilan: NegeriSembilan
  Pahang: Pahang
  Perak: Perak
  Perlis: Perlis
  Pulau Pinang: PulauPinang
  W.P. Putrajaya: Putrajaya
  Sabah: Sabah
  Sarawak: Sarawak
  Selangor: Selangor
  Terengganu: Trengganu
